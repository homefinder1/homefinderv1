name: Kör scraper dagligen

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout kod
        uses: actions/checkout@v4
      
      - name: Sätt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Installera beroenden
        run: |
          pip install playwright requests beautifulsoup4
          playwright install chromium
      
      - name: Kör scrapern
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python samla_annonser.py
      
      - name: Committa ny data
        run: |
          git config user.name "HomeFinder Bot"
          git config user.email "info@homefinder.se"
          git add annonser.json
          if git diff --staged --quiet; then
            echo "Inga ändringar att committa"
          else
            git commit -m "Automatisk uppdatering av annonser"
            # Hämta senaste ändringar från Lovable och rebasea ovanpå
            for i in 1 2 3; do
              git pull --rebase --autostash origin ${GITHUB_REF_NAME} && \
              git push origin HEAD:${GITHUB_REF_NAME} && break
              echo "Push misslyckades, försöker igen ($i/3)..."
              sleep 5
            done
          fi